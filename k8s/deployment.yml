apiVersion: apps/v1
kind: Deployment
metadata:
  name: siemens-configurator
  namespace: default
  labels:
    app: siemens-configurator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: siemens-configurator
  template:
    metadata:
      labels:
        app: siemens-configurator
    spec:
      containers:
        - name: configurator-app
          image: siemens-configurator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: configurator-config
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
